<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0A0A0A;
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 80px;
    position: relative;
  }

  /* Blobs */
  .blob1 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: #CC1500;
    opacity: 0.12;
    filter: blur(80px);
    right: -80px; top: -100px;
  }
  .blob2 {
    position: absolute;
    width: 360px; height: 360px;
    border-radius: 50%;
    background: #7C3AED;
    opacity: 0.10;
    filter: blur(70px);
    left: -60px; bottom: -80px;
  }
  .blob3 {
    position: absolute;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: #06B6D4;
    opacity: 0.07;
    filter: blur(60px);
    right: 200px; bottom: 0;
  }

  .label {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 20px;
  }

  .giuliana {
    font-size: 148px;
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    background: linear-gradient(118deg, #7C3AED 0%, #ffffff 28%, #CC1500 58%, #06B6D4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .dirocco {
    font-size: 112px;
    font-weight: 300;
    font-style: italic;
    line-height: 1;
    letter-spacing: -0.01em;
    background: linear-gradient(110deg, #ff4422 0%, #CC1500 45%, #ff7755 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 36px;
  }

  .tagline {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  .dot { color: #CC1500; margin: 0 10px; }

  .url {
    position: absolute;
    bottom: 36px;
    right: 80px;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,700;0,900;1,300&display=swap" rel="stylesheet">
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="blob3"></div>

  <p class="label">Hola, soy —</p>
  <h1 class="giuliana">Giuliana</h1>
  <h2 class="dirocco">Di Rocco</h2>
  <p class="tagline">
    Desarrolladora Web Freelance
    <span class="dot">·</span>
    React · Next.js · TypeScript
  </p>

  <p class="url">giulianadirocco.com</p>
</body>
</html>
